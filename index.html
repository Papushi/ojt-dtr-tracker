<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OJT DTR • 240hr</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font: Inter (Android friendly) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* Android-optimized variables & reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b1120;
            min-height: 100vh;
            padding: 12px;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        button, .tab-btn, .pill, .android-check, .icon-btn, .stat-tile {
            touch-action: manipulation;
            cursor: pointer;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Card style */
        .card {
            background: rgba(18, 28, 48, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(66, 153, 225, 0.15);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.6);
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #a5f3fc, #bae6fd, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Goal chip - clickable */
        .goal-chip {
            background: #1e293b;
            border-radius: 60px;
            padding: 8px 18px;
            border: 1px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .goal-chip:active {
            background: #2d3b4f;
            transform: scale(0.97);
        }
        .goal-chip .label {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .goal-chip .value {
            font-weight: 700;
            font-size: 1.5rem;
            color: #3b82f6;
        }

        /* Hidden goal input */
        #goalInput {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }

        /* Stat grid */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        .stat-tile {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 24px;
            padding: 18px 8px;
            text-align: center;
            border: 1px solid rgba(59,130,246,0.2);
            transition: 0.15s;
        }
        .stat-tile:active {
            background: #1e293b;
            transform: scale(0.97);
        }
        .stat-tile i {
            font-size: 1.8rem;
            color: #3b82f6;
            margin-bottom: 6px;
        }
        .stat-tile .number {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .stat-tile .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Progress area */
        .progress-area {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 40px;
            padding: 18px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #cbd5e1;
        }
        .progress-bar-bg {
            height: 28px;
            background: #1e293b;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 30px;
            transition: width 0.4s ease-out;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Scrollable tabs */
        .tabs-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs-wrapper::-webkit-scrollbar {
            display: none;
        }
        .tab-row {
            display: inline-flex;
            gap: 10px;
            padding: 0 2px;
        }
        .tab-btn {
            background: rgba(20, 30, 50, 0.8);
            border: 1px solid #2d3a4f;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 1rem;
            font-weight: 600;
            color: #b0c4de;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .tab-btn i {
            font-size: 1.2rem;
        }
        .tab-btn.active {
            background: #2563eb;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 10px 20px -8px #1e3a8a;
        }
        .tab-btn:active {
            transform: scale(0.96);
        }

        /* Sections */
        .section {
            display: none;
        }
        .section.active {
            display: block;
            animation: fadeSlide 0.25s ease;
        }
        @keyframes fadeSlide {
            0% { opacity: 0.3; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Form fields */
        .field-group {
            margin-bottom: 20px;
        }
        .field-group label {
            display: block;
            margin-bottom: 8px;
            color: #b9c9e0;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 18px;
            color: #3b82f6;
            font-size: 1.3rem;
            z-index: 2;
        }
        .input-wrapper input,
        .input-wrapper select,
        .input-wrapper textarea {
            width: 100%;
            padding: 18px 18px 18px 54px;
            background: #1a2538;
            border: 2px solid #2d3f5e;
            border-radius: 30px;
            font-size: 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
            appearance: none;
        }
        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: #3b82f6;
            outline: none;
            background: #1f314a;
        }

        /* Quick time pills */
        .quick-pills {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .pill {
            background: #26344b;
            padding: 12px 22px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #b0d4ff;
            border: 1px solid #3d506e;
            transition: 0.1s;
            flex: 1 0 auto;
            text-align: center;
        }
        .pill:active {
            background: #3b82f6;
            color: white;
            transform: scale(0.96);
        }

        /* Android checkboxes */
        .android-check {
            display: flex;
            align-items: center;
            background: #1e2a3a;
            border-radius: 40px;
            padding: 16px 20px;
            border: 1px solid #334155;
            margin-bottom: 12px;
        }
        .android-check input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 16px;
            accent-color: #3b82f6;
            transform: scale(1.2);
        }
        .android-check span {
            font-size: 1rem;
            color: #e2e8f0;
        }

        /* Action buttons */
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0 12px;
        }
        .btn {
            flex: 1 1 auto;
            padding: 18px 22px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #2d3b50;
            color: white;
            transition: all 0.15s;
            border: 1px solid #405770;
            min-width: 140px;
        }
        .btn-primary {
            background: linear-gradient(145deg, #2563eb, #3b82f6);
            border: none;
            box-shadow: 0 12px 20px -12px #1e3a8a;
        }
        .btn-success {
            background: #059669;
        }
        .btn-danger {
            background: #b91c1c;
        }
        .btn:active {
            transform: scale(0.96);
            filter: brightness(1.2);
        }

        /* Table */
        .table-scroll {
            overflow-x: auto;
            border-radius: 28px;
            background: #111c2e;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        th {
            background: #1e2f44;
            color: #b4d0ff;
            font-weight: 600;
            padding: 16px 10px;
            font-size: 0.85rem;
            text-align: left;
        }
        td {
            padding: 16px 10px;
            border-bottom: 1px solid #253649;
            color: #d1e0f0;
        }
        .weekend-row {
            background: rgba(245, 158, 11, 0.15);
        }
        .holiday-row {
            background: rgba(220, 38, 38, 0.2);
        }
        .holiday-badge {
            background: #b91c1c;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-left: 6px;
            white-space: nowrap;
        }

        .action-cell {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: #253b55;
            border: none;
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 30px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.edit { background: #0f766e; }
        .icon-btn.delete { background: #991b1b; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e2a3c;
            width: 100%;
            max-width: 480px;
            border-radius: 40px 40px 0 0;
            padding: 30px 24px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            color: white;
            margin-bottom: 20px;
        }
        .modal-close {
            font-size: 2.4rem;
            line-height: 1;
            color: #94a3b8;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e2f44;
            border-left: 6px solid #10b981;
            border-radius: 50px;
            padding: 18px 24px;
            color: white;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 14px;
            box-shadow: 0 20px 40px black;
            z-index: 2000;
            max-width: 400px;
            margin: 0 auto;
        }

        .footer-note {
            text-align: center;
            color: #5f7a9a;
            font-size: 0.8rem;
            padding: 24px 0 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header card -->
    <div class="card">
        <div class="header-row">
            <div class="logo">
                <h1>240·DTR</h1>
                <span><i class="fas fa-clock"></i> OJT tracker</span>
            </div>
            <!-- Clickable goal chip -->
            <div class="goal-chip" id="goalChip">
                <span class="label">GOAL</span>
                <span class="value" id="goalDisplay">240</span>
            </div>
            <!-- Hidden input for goal -->
            <input type="number" id="goalInput" value="240" min="1" max="1000">
        </div>
    </div>

    <!-- Stats 2x2 -->
    <div class="stat-grid">
        <div class="stat-tile">
            <i class="fas fa-check-circle"></i>
            <div class="number" id="statCompleted">0</div>
            <div class="label">HOURS</div>
        </div>
        <div class="stat-tile">
            <i class="fas fa-hourglass-half"></i>
            <div class="number" id="statRemaining">240</div>
            <div class="label">LEFT</div>
        </div>
        <div class="stat-tile">
            <i class="fas fa-calendar-day"></i>
            <div class="number" id="statDays">0</div>
            <div class="label">DAYS</div>
        </div>
        <div class="stat-tile">
            <i class="fas fa-chart-line"></i>
            <div class="number" id="statAvg">0</div>
            <div class="label">AVG</div>
        </div>
    </div>

    <!-- Progress card -->
    <div class="progress-area">
        <div class="progress-header">
            <span><i class="fas fa-flag-checkered" style="color:#3b82f6;"></i> <span id="goalDisplay2">240</span> hours target</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill" style="width:0%;"></div>
        </div>
        <div class="progress-stats">
            <span id="progressFraction">0/240</span>
            <span id="progressEstimate">add entries</span>
        </div>
    </div>

    <!-- Tabs (scrollable) -->
    <div class="tabs-wrapper">
        <div class="tab-row">
            <button class="tab-btn active" id="tabDashboard"><i class="fas fa-home"></i> Home</button>
            <button class="tab-btn" id="tabAdd"><i class="fas fa-plus-circle"></i> Add</button>
            <button class="tab-btn" id="tabBulk"><i class="fas fa-layer-group"></i> Bulk</button>
            <button class="tab-btn" id="tabHolidays"><i class="fas fa-glass-cheers"></i> Holidays</button>
            <button class="tab-btn" id="tabReports"><i class="fas fa-chart-pie"></i> Stats</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="section active" id="dashboardSection">
        <div class="btn-row">
            <button class="btn btn-success" id="exportBtn"><i class="fas fa-download"></i> CSV</button>
            <button class="btn" id="printBtn"><i class="fas fa-print"></i> Print</button>
            <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
        </div>
        <div class="table-scroll" id="entriesTable"></div>
    </div>

    <!-- Add single -->
    <div class="section" id="addSection">
        <div class="field-group">
            <label><i class="fas fa-calendar"></i> Date</label>
            <div class="input-wrapper">
                <i class="fas fa-calendar-alt"></i>
                <input type="date" id="date">
            </div>
        </div>
        <div class="field-group">
            <label>Time In (AM)</label>
            <div class="input-wrapper">
                <i class="fas fa-sun"></i>
                <input type="time" id="timeIn" value="07:00">
            </div>
            <div class="quick-pills">
                <span class="pill" onclick="setTime('timeIn','07:00')">7am</span>
                <span class="pill" onclick="setTime('timeIn','08:00')">8am</span>
                <span class="pill" onclick="setTime('timeIn','09:00')">9am</span>
            </div>
        </div>
        <div class="field-group">
            <label>Time Out (PM)</label>
            <div class="input-wrapper">
                <i class="fas fa-moon"></i>
                <input type="time" id="timeOut" value="17:00">
            </div>
            <div class="quick-pills">
                <span class="pill" onclick="setTime('timeOut','17:00')">5pm</span>
                <span class="pill" onclick="setTime('timeOut','18:00')">6pm</span>
                <span class="pill" onclick="setTime('timeOut','19:00')">7pm</span>
            </div>
        </div>
        <div class="field-group">
            <label>Break (min)</label>
            <div class="input-wrapper">
                <i class="fas fa-mug-hot"></i>
                <input type="number" id="break" value="60" min="0" step="5">
            </div>
        </div>
        <div class="field-group">
            <label>Category</label>
            <div class="input-wrapper">
                <i class="fas fa-tag"></i>
                <select id="category">
                    <option value="IT/Software">💻 IT/Software</option>
                    <option value="Admin/HR">📋 Admin/HR</option>
                    <option value="Engineering">⚙️ Engineering</option>
                    <option value="Marketing">📊 Marketing</option>
                </select>
            </div>
        </div>
        <div class="field-group">
            <label>Remarks</label>
            <div class="input-wrapper">
                <i class="fas fa-building"></i>
                <input type="text" id="remarks" placeholder="Office / WFH">
            </div>
        </div>

        <div class="android-check" onclick="toggleHoliday()">
            <input type="checkbox" id="isHoliday">
            <span><i class="fas fa-glass-cheers"></i> Holiday (0 hours)</span>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> Save entry</button>
        </div>
    </div>

    <!-- Bulk section -->
    <div class="section" id="bulkSection">
        <div class="field-group">
            <label>From</label>
            <div class="input-wrapper">
                <i class="fas fa-calendar"></i>
                <input type="date" id="bulkFromDate" value="2024-02-01">
            </div>
        </div>
        <div class="field-group">
            <label>To</label>
            <div class="input-wrapper">
                <i class="fas fa-calendar"></i>
                <input type="date" id="bulkToDate" value="2024-02-28">
            </div>
        </div>
        <div class="field-group">
            <label>Time In</label>
            <div class="input-wrapper">
                <i class="fas fa-sun"></i>
                <input type="time" id="bulkTimeIn" value="07:00">
            </div>
        </div>
        <div class="field-group">
            <label>Time Out</label>
            <div class="input-wrapper">
                <i class="fas fa-moon"></i>
                <input type="time" id="bulkTimeOut" value="17:00">
            </div>
        </div>
        <div class="field-group">
            <label>Break (min)</label>
            <div class="input-wrapper">
                <i class="fas fa-hourglass-half"></i>
                <input type="number" id="bulkBreak" value="60">
            </div>
        </div>

        <div class="android-check">
            <input type="checkbox" id="bulkSkipWeekends" checked>
            <span>⛱️ Skip weekends</span>
        </div>
        <div class="android-check">
            <input type="checkbox" id="bulkSkipHolidays" checked>
            <span>🎉 Skip holidays</span>
        </div>

        <button class="btn btn-primary" id="previewBtn"><i class="fas fa-eye"></i> Preview</button>

        <div id="bulkPreviewArea" style="margin-top:24px; display:none;">
            <div class="table-scroll" id="bulkPreviewTable"></div>
            <button class="btn btn-success" id="saveBulkBtn" style="margin-top:16px;"><i class="fas fa-save"></i> Save all</button>
        </div>
    </div>

    <!-- Holidays -->
    <div class="section" id="holidaysSection">
        <div class="field-group">
            <label>Date</label>
            <div class="input-wrapper">
                <i class="fas fa-calendar"></i>
                <input type="date" id="holidayDate">
            </div>
        </div>
        <div class="field-group">
            <label>Holiday name</label>
            <div class="input-wrapper">
                <i class="fas fa-tag"></i>
                <input type="text" id="holidayName" placeholder="e.g. Christmas">
            </div>
        </div>
        <button class="btn btn-primary" id="addHolidayBtn"><i class="fas fa-plus"></i> Add holiday</button>
        <div class="table-scroll" style="margin-top:24px;" id="holidaysTable"></div>
    </div>

    <!-- Reports -->
    <div class="section" id="reportsSection">
        <div class="stat-grid">
            <div class="stat-tile">
                <i class="fas fa-calendar-week"></i>
                <div class="number" id="reportWeek">0</div>
                <div class="label">THIS WEEK</div>
            </div>
            <div class="stat-tile">
                <i class="fas fa-calendar-alt"></i>
                <div class="number" id="reportMonth">0</div>
                <div class="label">THIS MONTH</div>
            </div>
        </div>
        <div class="field-group">
            <label>Filter from</label>
            <div class="input-wrapper">
                <i class="fas fa-calendar"></i>
                <input type="date" id="filterFrom">
            </div>
        </div>
        <div class="field-group">
            <label>Filter to</label>
            <div class="input-wrapper">
                <i class="fas fa-calendar"></i>
                <input type="date" id="filterTo">
            </div>
        </div>
        <button class="btn btn-primary" id="filterBtn"><i class="fas fa-filter"></i> Apply filter</button>
        <div class="table-scroll" style="margin-top:24px;" id="filteredTable"></div>
    </div>

    <!-- Footer -->
    <div class="footer-note">
        <i class="fas fa-heart" style="color:#ef4444;"></i> Data saves in your phone
    </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="color:white;"><i class="fas fa-edit"></i> Edit entry</h2>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="field-group">
                <label>Date</label>
                <div class="input-wrapper">
                    <i class="fas fa-calendar"></i>
                    <input type="date" id="editDate" required>
                </div>
            </div>
            <div class="field-group">
                <label>Time In</label>
                <div class="input-wrapper">
                    <i class="fas fa-sun"></i>
                    <input type="time" id="editTimeIn" required>
